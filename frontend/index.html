<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <title>VitalTrack Pro</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#030712"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="VitalTrack"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="icon" type="image/png" href="/icon-192.png"/>
  <meta name="format-detection" content="telephone=no"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      /* Backgrounds */
      --bg:      #030712;
      --bg2:     #0a1628;
      --card:    rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.09);

      /* Accent colors — same as before */
      --teal:    #00ffe7;
      --pink:    #ff2d78;
      --blue:    #38bdf8;
      --violet:  #a78bfa;
      --green:   #22d3a5;
      --orange:  #fb923c;

      /* ── TEXT COLORS — Balanced, not too bright, not too dark ── */
      --text:    #dde3ed;   /* primary text  — soft white, easy on eyes */
      --text2:   #a8b8cc;   /* secondary     — medium gray-blue         */
      --muted:   #6b7f96;   /* labels/captions — clearly visible        */
      --dim:     #3d4f62;   /* truly subtle   — use sparingly           */

      --font-head: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;

      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { height:100%; scroll-behavior:smooth; -webkit-text-size-adjust:100%; }

    body {
      height:100%;
      background: var(--bg);
      color: var(--text);             /* soft white — readable without glowing */
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    #root { height:100%; position:relative; z-index:1; }

    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,255,231,0.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,231,0.02) 1px,transparent 1px);
      background-size:44px 44px;
      animation:gridMove 22s linear infinite;
    }
    @keyframes gridMove { 0%{background-position:0 0} 100%{background-position:44px 44px} }

    body::after {
      content:''; position:fixed; top:-120px; left:-120px;
      width:420px; height:420px; border-radius:50%;
      background:radial-gradient(circle,rgba(0,255,231,0.04) 0%,transparent 70%);
      pointer-events:none; z-index:0;
      animation:orbFloat 14s ease-in-out infinite;
    }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }

    ::-webkit-scrollbar { width:3px; height:3px; }
    ::-webkit-scrollbar-thumb { background:rgba(0,255,231,0.15); border-radius:99px; }

    /* Form elements */
    input, select, button, textarea {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    @media (max-width:768px) {
      input, select, textarea { font-size:16px !important; }
    }
    input, textarea {
      color: var(--text) !important;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--muted) !important; opacity:1; }
    select {
      color: var(--text) !important;
      background: #0e1d30;
      border: 1px solid rgba(255,255,255,0.11);
      -webkit-appearance: none;
    }
    select option { background:#1a2d45; color:var(--text); }

    button, a { min-height:44px; }

    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
    }
    .glass-sm {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border-radius: 12px;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .fade-up  { animation:fadeUp .38s cubic-bezier(.2,.8,.2,1) both; }
    .delay-1  { animation-delay:.06s; }
    .delay-2  { animation-delay:.12s; }
    .delay-3  { animation-delay:.18s; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    @keyframes pulseRing { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.05);opacity:1} }
    @keyframes progressFill { from{width:0%} }
    .progress-bar { animation:progressFill 1.2s cubic-bezier(.4,0,.2,1) both; }
    @keyframes countUp { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .count-up { animation:countUp .4s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes scan { 0%{top:-10%} 100%{top:110%} }

    input:focus, select:focus, textarea:focus {
      outline:none !important;
      border-color:var(--teal) !important;
      box-shadow:0 0 0 2px rgba(0,255,231,0.10) !important;
    }

    .btn-glow { position:relative; overflow:hidden; transition:all .2s; }
    .btn-glow:active { transform:scale(.97) !important; }

    .scan-effect { position:relative; overflow:hidden; }
    .scan-effect::after {
      content:''; position:absolute; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,255,231,0.25),transparent);
      animation:scan 4s linear infinite; pointer-events:none;
    }

    /* Labels */
    label {
      color: var(--muted);
      font-size: 11px; letter-spacing:1.2px;
      text-transform: uppercase;
      font-family: var(--font-head);
    }
    code {
      background:rgba(0,255,231,0.07); color:var(--teal);
      padding:2px 6px; border-radius:4px; font-size:12px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
